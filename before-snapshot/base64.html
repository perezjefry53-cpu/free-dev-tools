<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Encoder/Decoder - Free Online Tool</title>
    <meta name="description" content="Free online Base64 encoder and decoder. Encode and decode Base64 instantly.">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1206; color: #fef7e8; min-height: 100vh; }
        header { padding: 20px; text-align: center; background: rgba(245,158,11,0.08); border-bottom: 1px solid rgba(245,158,11,0.12); }
        header h1 { font-size: 28px; color: #f59e0b; } header p { color: #b8844a; font-size: 14px; }
        main { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        textarea { width: 100%; min-height: 150px; background: #2a1f0e; color: #fef7e8; border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; resize: vertical; }
        textarea:focus { outline: none; border-color: #f59e0b; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 700; transition: all 0.2s; background: linear-gradient(135deg, #f59e0b, #f472b6); color: #1a1206; margin: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .donation { margin-top: 40px; padding: 20px; background: rgba(245,158,11,0.05); border-radius: 12px; border: 1px solid rgba(245,158,11,0.15); text-align: center; }
        .donation code { display: block; background: #2a1f0e; padding: 12px; border-radius: 8px; margin: 12px auto; max-width: 400px; color: #f59e0b; word-break: break-all; font-size: 13px; }
        footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; border-top: 1px solid rgba(245,158,11,0.1); }
    </style>
</head>
<body>
    <header><h1>✦ Base64 Encoder / Decoder</h1><p>Encode and decode Base64 — free & fast</p></header>
    <main>
        <div class="grid">
            <div><textarea id="input" placeholder="Enter text to encode or decode..."></textarea></div>
            <div><textarea id="output" placeholder="Result..." readonly></textarea></div>
        </div>
        <div style="text-align:center;">
            <button class="btn" onclick="encode()">⬆ Encode</button>
            <button class="btn" onclick="decode()">⬇ Decode</button>
            <button class="btn" onclick="copyResult()">📋 Copy</button>
            <button class="btn" onclick="clearAll()">🗑️ Clear</button>
            <div id="status" style="margin-top:8px; font-size:13px; color:#b8844a;"></div>
        </div>
        <!-- A-Ads -->
<div style="max-width:600px; margin:20px auto; text-align:center; min-height:60px;">
    <iframe data-aa="2439610" src="//acceptable.a-ads.com/2439610/?size=Adaptive" style="border:0; padding:0; width:100%; height:auto; overflow:hidden; display:block; margin:auto;"></iframe>
</div>
<!-- Mid-page Ad -->
    <div style="margin:20px auto; max-width:600px; background:linear-gradient(135deg, rgba(245,158,11,0.06), rgba(245,158,11,0.02)); border:1px solid rgba(245,158,11,0.1); border-radius:10px; padding:12px 16px; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;">
        <span style="font-size:10px; color:#6b7280; text-transform:uppercase; letter-spacing:1px;">Ad</span>
        <span style="color:#b8844a; font-size:12px;">Support free tools — </span>
        <a href="https://www.coinbase.com/join" target="_blank" rel="sponsored" style="color:#22c55e; font-size:12px; font-weight:600;">Get $10 free Bitcoin on Coinbase →</a>
    </div>

    <div class="donation">
            <p style="color:#b8844a;">☕ Support free dev tools — donate crypto</p>
            <code>0x8bEF7ba775bC7657D0819440c262965F9E1218F1</code>
        </div>
        <p style="margin-top:16px; text-align:center;"><a href="../" style="color:#f59e0b;">← Back to DevToolBox</a></p>
    </main>
    <footer><p>© 2026 — <a href="https://perezjefry53-cpu.github.io/devtoolbox-shop/premium.html" style="color:#f59e0b;">Premium Tools</a></p></footer>
    <script>
        function encode() { const inp = document.getElementById('input').value; try { document.getElementById('output').value = btoa(inp); document.getElementById('status').textContent = '✅ Encoded'; } catch(e) { document.getElementById('status').textContent = '❌ Error: ' + e.message; } }
        function decode() { const inp = document.getElementById('input').value; try { document.getElementById('output').value = atob(inp); document.getElementById('status').textContent = '✅ Decoded'; } catch(e) { document.getElementById('status').textContent = '❌ Error: ' + e.message; } }
        function copyResult() { const text = document.getElementById('output').value; if(text) navigator.clipboard.writeText(text).then(() => document.getElementById('status').textContent = '📋 Copied!'); }
        function clearAll() { document.getElementById('input').value = ''; document.getElementById('output').value = ''; document.getElementById('status').textContent = ''; }
    </script>
</body>
</html>
