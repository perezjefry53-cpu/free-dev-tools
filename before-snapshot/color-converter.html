<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Converter - HEX to RGB, HSL, CMYK Free Online</title>
    <meta name="description" content="Free online color converter. Convert HEX to RGB, HSL, CMYK, and more. Color picker with instant conversion.">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1206; color: #fef7e8; min-height: 100vh; }
        header { padding: 20px; text-align: center; background: rgba(245,158,11,0.08); border-bottom: 1px solid rgba(245,158,11,0.12); }
        header h1 { font-size: 28px; color: #f59e0b; } header p { color: #b8844a; font-size: 14px; }
        main { max-width: 600px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .color-preview { width: 100%; height: 150px; border-radius: 12px; margin: 20px 0; border: 2px solid rgba(245,158,11,0.2); }
        input[type="color"] { width: 80px; height: 80px; border: none; cursor: pointer; background: none; }
        .formats { display: grid; gap: 8px; }
        .fmt { background: #2a1f0e; border: 1px solid rgba(245,158,11,0.15); border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .fmt:hover { border-color: #f59e0b; }
        .fmt .label { color: #b8844a; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .fmt .value { color: #fef7e8; font-family: monospace; font-size: 14px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; background: rgba(245,158,11,0.2); color: #f59e0b; }
        .btn:hover { background: rgba(245,158,11,0.3); }
        footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; border-top: 1px solid rgba(245,158,11,0.1); }
    </style>
</head>
<body>
    <header><h1>✦ Color Converter</h1><p>HEX ↔ RGB ↔ HSL ↔ CMYK — instant conversion</p></header>
    <main>
        <div class="color-preview" id="preview" style="background:#f59e0b;"></div>
        <input type="color" id="picker" value="#f59e0b" oninput="updateColors(this.value)">
        <div class="formats" id="formats"></div>
        <p style="margin-top:16px;"><a href="../" style="color:#f59e0b;">← DevToolBox Pro</a></p>
    </main>
    <footer><p>© 2026 DevToolBox — Free Developer Tools</p></footer>
    <script>
        function hexToRgb(h) { const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16); return {r,g,b}; }
        function rgbToHsl(r,g,b) { r/=255;g/=255;b/=255; const M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m; let h,s,l=(M+m)/2; if(d===0) h=s=0; else { s=l>0.5?d/(2-M-m):d/(M+m); switch(M){case r: h=((g-b)/d+(g<b?6:0))/6;break;case g: h=((b-r)/d+2)/6;break;case b: h=((r-g)/d+4)/6;break} } return {h:h*360,s:s*100,l:l*100}; }
        function rgbToCmyk(r,g,b) { const c=1-r/255,m=1-g/255,y=1-b/255,k=Math.min(c,m,y); return {c:((c-k)/(1-k)*100)||0,m:((m-k)/(1-k)*100)||0,y:((y-k)/(1-k)*100)||0,k:k*100}; }
        function updateColors(hex) {
            document.getElementById('preview').style.background = hex;
            const rgb = hexToRgb(hex);
            const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
            const cmyk = rgbToCmyk(rgb.r, rgb.g, rgb.b);
            const formats = [
                {label:'HEX', value:hex},
                {label:'RGB', value:`rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`},
                {label:'HSL', value:`hsl(${hsl.h.toFixed(1)}°, ${hsl.s.toFixed(1)}%, ${hsl.l.toFixed(1)}%)`},
                {label:'CMYK', value:`cmyk(${cmyk.c.toFixed(1)}%, ${cmyk.m.toFixed(1)}%, ${cmyk.y.toFixed(1)}%, ${cmyk.k.toFixed(1)}%)`}
            ];
            document.getElementById('formats').innerHTML = formats.map(f => `<div class="fmt" onclick="copyValue('${f.value}')"><span class="label">${f.label}</span><span class="value">${f.value}</span><span class="btn">Copy</span></div>`).join('');
        }
        function copyValue(v) { navigator.clipboard.writeText(v); }
        updateColors('#f59e0b');
    </script>
</body>
</html>
